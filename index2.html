<!DOCTYPE html>
<html lang="en">
<head>
    <!--Metadata for the page-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intramurals Form</title>

<!--Pyscript core CSS-->
<link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">

<!--PyScript JS-->
<script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<!--Internal CSS for Dark Academia theme-->
<style>
    /* Body: page background, font choice, color, padding */
body {
    margin: 0;
    padding: 30px;
    font-family: Georgia, serif;
    background:
        linear-gradient(rgba(15,12,9,0.9), rgba(15,12,9,0.9)),
        url("https://images.unsplash.com/photo-1524995997946-a1c2e315a42f");
    background-size: cover;
    background-attachment: fixed;
    background-position: center;
    color: #e8dcc8;
}

.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(20,15,10,0.95);
    padding: 18px 50px;
    border-bottom: 1px solid #c6a75e;
}

.logo {
    color: #f5f1e8;
    font-size: 24px;
}

.nav-links {
    list-style: none;
    display: flex;
    gap: 25px;
}

.nav-links a {
    text-decoration: none;
    color: #e8dcc8;
}

.nav-links a:hover {
    color: #c6a75e;
}

 /* Card container for the form */
.card {
    background: #2a1f18;
    border: 1px solid #3b2a21;
    border-left: 5px solid #c6a75e;
    border-radius: 14px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.7);
    color: #e8dcc8;
}

/* Each section of the form, separated visually */
.form-section {
    background-color: #1f1813;
    padding: 15px;
    margin-bottom: 20px;
}

/* Buttons in Dark Academia style */
.btn-primary {
    background: #3b2a21;
    border: 1px solid #c6a75e;
}

/* Button hover effect */
.btn-primary:hover {
    background: #c6a75e;
    color: #1b1410;
}
</style>
</head>

<body>

<nav class="navbar">
    <div class="logo">YourAcademiaSite.com</div>
    <ul class="nav-links">
        <li><a href="index1.html">Sign Up Page</a></li>
        <li><a href="index2.html">Team Checker</a></li>
        <li><a href="index3.html">Team Players</a></li>
    </ul>
</nav>

<br><br>

<!-- Main container for central alignment -->
<div class="container">

    <!-- Card wrapping the entire form -->
    <div class="card mx-auto" style="max-width:600px;">
        
        <!-- Form title -->
        <h1 class="text-center mb-4">Intramurals Eligibility Form</h1>

 <!-- Registration Section -->
        <div class="form-section">
            <label class="form-label">Registered Online?</label><br>
            <!-- Radio button option for Yes -->
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="registration" value="Yes">
                <label class="form-check-label">Yes</label>
            </div>
            <!-- Radio button option for No -->
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="registration" value="No">
                <label class="form-check-label">No</label>
            </div>
        </div>

        <!-- Medical Clearance Section -->
        <div class="form-section">
            <label class="form-label">Medical Clearance?</label><br>
            <!-- Radio button option for Yes -->
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="medical" value="Yes">
                <label class="form-check-label">Yes</label>
            </div>
            <!-- Radio button option for No -->
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="medical" value="No">
                <label class="form-check-label">No</label>
            </div>
        </div>

        <!-- Grade Selection -->
        <div class="form-section">
            <label class="form-label">Grade</label>
            <!-- Dropdown for grade -->
            <select id="grade" class="form-select">
                <option value="">Select Grade</option> <!-- Placeholder -->
                <option>7</option>
                <option>8</option>
                <option>9</option>
                <option>10</option>
            </select>
        </div>

        <!-- Section Selection -->
        <div class="form-section">
            <label class="form-label">Section</label>
            <!-- Dropdown for section selection -->
            <select id="section" class="form-select">
                <option value="">Select Section</option> <!-- Placeholder -->
                <option>RUBY</option>
                <option>EMERALD</option>
                <option>SAPPHIRE</option>
                <option>TOPAZ</option>
                <option>JADE</option>
            </select>
        </div>

 <!-- Button to check eligibility -->
        <div class="text-center mt-4">
            <button class="btn btn-primary btn-lg" id="checkBtn">Check Eligibility</button>
        </div>

        <!-- Container for displaying results -->
        <div id="result" class="mt-4" style="text-align:center"></div>
    </div>
</div>
    <!-- PyScript linking external Python file -->
    <py-script src="main.py"></py-script>

</body>
</html>
